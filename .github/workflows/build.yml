name: Build LocalChat binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish Releases on tag pushes

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            features: --features tray
            artifact: LocalChat-windows-x64.exe
            bin: LocalChat.exe

          - name: Windows x86 (32-bit)
            runner: windows-latest
            target: i686-pc-windows-msvc
            features: --features tray
            artifact: LocalChat-windows-x86.exe
            bin: LocalChat.exe

          - name: Windows arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            features: --features tray
            artifact: LocalChat-windows-arm64.exe
            bin: LocalChat.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}


      - name: Collect & size check
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact }}"
          ls -la dist
          size=$(wc -c < "dist/${{ matrix.artifact }}")
          echo "Binary size: $size bytes"
          # Soft ceiling: 15 MB. Bump if needed, but keep an eye on bloat.
          test "$size" -lt 15728640

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
