name: Build LocalChat binaries

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish Releases on tag pushes

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc
          workspaces: app

      - name: Build
        shell: bash
        working-directory: app
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --features tray

      - name: Collect & size check
        shell: bash
        run: |
          mkdir -p dist
          cp "app/target/x86_64-pc-windows-msvc/release/localchat.exe" "dist/LocalChat.exe"
          ls -la dist
          size=$(wc -c < "dist/LocalChat.exe")
          echo "Binary size: $size bytes"
          # Soft ceiling: 15 MB. Bump if needed, but keep an eye on bloat.
          test "$size" -lt 15728640

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalChat.exe
          path: dist/LocalChat.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Compute next version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Tag push: use the tag as-is.
            TAG="${GITHUB_REF#refs/tags/}"
          else
            # Auto-bump patch from the highest existing vMAJOR.MINOR.PATCH tag.
            git fetch --tags --force >/dev/null 2>&1 || true
            LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
              | sort -V \
              | tail -n1)
            if [[ -z "$LATEST" ]]; then
              TAG="v0.1.0"
            else
              IFS='.' read -r MA MI PA <<< "${LATEST#v}"
              TAG="v${MA}.${MI}.$((PA + 1))"
            fi
          fi
          echo "Selected tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true
