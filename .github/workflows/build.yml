name: Build LocalChat binaries

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed to publish Releases on tag pushes

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            features: --features tray
            artifact: LocalChat-windows-x64.exe
            bin: LocalChat.exe

          # Linux runs without the tray feature (avoids GTK requirement).
          - name: Linux x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: --no-default-features
            artifact: LocalChat-linux-x64
            bin: LocalChat

          - name: Linux arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: --no-default-features
            artifact: LocalChat-linux-arm64
            bin: LocalChat
            cross: true

          # macOS Intel — "old" Macs (pre-M1). macos-13 is the last Intel runner.
          - name: macOS Intel (x64)
            runner: macos-13
            target: x86_64-apple-darwin
            features: --features tray
            artifact: LocalChat-macos-x64
            bin: LocalChat

          # macOS Apple Silicon — "new" Macs (M1/M2/M3/M4).
          - name: macOS Apple Silicon (arm64)
            runner: macos-14
            target: aarch64-apple-darwin
            features: --features tray
            artifact: LocalChat-macos-arm64
            bin: LocalChat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (linux arm64 only)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build (native)
        if: matrix.cross != true
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Collect & size check
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact }}"
          ls -la dist
          size=$(wc -c < "dist/${{ matrix.artifact }}")
          echo "Binary size: $size bytes"
          # Soft ceiling: 15 MB. Bump if needed, but keep an eye on bloat.
          test "$size" -lt 15728640

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
