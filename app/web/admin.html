<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="application-name" content="LocalChat Admin" />
  <meta name="description" content="LocalChat admin dashboard." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="referrer" content="no-referrer" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0b0d13" />
  <title>LocalChat — Admin</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='32' y2='32' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23ef4444'/%3E%3Cstop offset='1' stop-color='%23f97316'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M16 5l8 2.8v6.7c0 4.9-3.3 8.8-8 10.5-4.7-1.7-8-5.6-8-10.5V7.8z' fill='white'/%3E%3Cpath d='M12 15.5l2.8 2.8 5.2-5.6' fill='none' stroke='%23ef4444' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"/>
  <link rel="stylesheet" href="/style.css"/>
  <script>
    // Restore theme (dark by default for the operations dashboard).
    (function () {
      try {
        var t = localStorage.getItem("localchat-admin-theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
</head>
<body class="admin-shell">
  <!-- Dashboard (gated to loopback at the server — no auth UI). -->
  <div id="dash" class="ad-shell">
    <header class="ad-top">
      <button class="ad-top-burger" id="adBurger" aria-label="Toggle navigation" title="Menu">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <div class="ad-top-brand">
        <div class="ad-mark sm" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="22" height="22">
            <defs>
              <linearGradient id="adGrad2" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#ef4444"/><stop offset="1" stop-color="#f97316"/>
              </linearGradient>
            </defs>
            <rect width="32" height="32" rx="8" fill="url(#adGrad2)"/>
            <path d="M16 5l8 2.8v6.7c0 4.9-3.3 8.8-8 10.5-4.7-1.7-8-5.6-8-10.5V7.8z" fill="white"/>
          </svg>
        </div>
        <span>LocalChat <strong>Admin</strong></span>
      </div>
      <div class="ad-top-meta">
        <span id="adVersion" class="ad-pill" title="Server version">v?</span>
        <span id="adLive" class="ad-pill ok" title="Connection healthy"><span class="ad-dot"></span>live</span>
        <span class="ad-pill" title="Admin is gated to the host machine"><span class="ad-dot"></span>host-only</span>
      </div>
      <div class="ad-top-actions">
        <button class="ad-icon-btn" id="adRefreshBtn" title="Refresh (R)" aria-label="Refresh">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-3-6.7M21 4v5h-5"/></svg>
        </button>
        <button class="ad-icon-btn" id="adThemeBtn" title="Toggle theme (T)" aria-label="Toggle theme"></button>
      </div>
    </header>

    <div id="adUpdateBanner" class="ad-banner hidden" role="status">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
      <span class="ad-banner-text">Update available: <strong id="adUpdTag">—</strong></span>
      <a id="adUpdLink" class="btn btn-primary" href="#" target="_blank" rel="noopener">Download</a>
      <button class="btn btn-ghost" id="adUpdDismiss" type="button">Dismiss</button>
    </div>

    <div class="ad-layout">
      <nav class="ad-rail" id="adRail" aria-label="Admin sections">
        <ul class="ad-nav">
          <li data-route="overview" class="active">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13l9-9 9 9M5 11v9h14v-9"/></svg>
            <span>Overview</span>
          </li>
          <li data-route="users">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.9M16 3.1a4 4 0 010 7.8"/></svg>
            <span>Users</span>
            <span class="ad-rail-badge" id="navUsers"></span>
          </li>
          <li data-route="channels">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h16M4 15h16M10 3l-2 18M16 3l-2 18"/></svg>
            <span>Channels</span>
            <span class="ad-rail-badge" id="navChannels"></span>
          </li>
          <li data-route="uploads">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <span>Uploads</span>
            <span class="ad-rail-badge" id="navUploads"></span>
          </li>
          <li data-route="logs">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M9 13h6M9 17h6M9 9h2"/></svg>
            <span>Logs</span>
            <span class="ad-rail-badge ad-rail-badge-warn" id="navLogs"></span>
          </li>
          <li data-route="share">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
            <span>Share &amp; pair</span>
          </li>
          <li data-route="broadcast">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l18-7v16L3 13zM3 11v2M21 4v16"/></svg>
            <span>Broadcast</span>
          </li>
          <li data-route="settings">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>
            <span>Settings</span>
          </li>
        </ul>
        <div class="ad-rail-foot">
          <div class="ad-rail-update" id="adRailUpdate">checking…</div>
        </div>
      </nav>

      <main class="ad-main" id="adMain"></main>
    </div>
  </div>

  <div id="adModal" class="ad-modal hidden" role="dialog" aria-modal="true"></div>
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="/admin.js"></script>
</body>
</html>
