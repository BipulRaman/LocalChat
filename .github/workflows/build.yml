name: Build LocalChat binaries

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish Releases on tag pushes

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) + target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc
          workspaces: app

      - name: Build
        shell: bash
        working-directory: app
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --features tray

      - name: Collect & size check
        shell: bash
        run: |
          mkdir -p dist
          cp "app/target/x86_64-pc-windows-msvc/release/localchat.exe" "dist/LocalChat.exe"
          ls -la dist
          size=$(wc -c < "dist/LocalChat.exe")
          echo "Binary size: $size bytes"
          # Soft ceiling: 15 MB. Bump if needed, but keep an eye on bloat.
          test "$size" -lt 15728640

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalChat.exe
          path: dist/LocalChat.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
